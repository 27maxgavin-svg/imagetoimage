<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image to Image — Free & Unlimited</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a30;
      --accent: #7c6aff;
      --accent-glow: rgba(124, 106, 255, 0.25);
      --text: #e8e8f0;
      --muted: #6b6b7a;
      --success: #4ade80;
      --error: #f87171;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .badge {
      display: inline-block;
      background: var(--accent-glow);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 720px;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    @media (max-width: 560px) {
      .panels { grid-template-columns: 1fr; }
    }

    .panel-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .drop-zone img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }

    .drop-zone input[type="file"] {
      display: none;
    }

    .drop-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      opacity: 0.4;
    }

    .drop-text {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      padding: 0 12px;
    }

    .output-panel {
      border: 2px solid var(--border);
      border-radius: 12px;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .output-panel img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }

    .output-placeholder {
      font-size: 2rem;
      opacity: 0.2;
    }

    .output-placeholder p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 8px;
      text-align: center;
    }

    .spinner {
      display: none;
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .download-btn {
      display: none;
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(13,13,15,0.85);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background 0.2s;
      text-decoration: none;
    }

    .download-btn:hover { background: var(--surface); }

    .prompt-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      padding: 12px 14px;
      resize: none;
      height: 80px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    textarea::placeholder { color: var(--muted); }
    textarea:focus { border-color: var(--accent); }

    .generate-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 0 0 var(--accent-glow);
    }

    .generate-btn:hover:not(:disabled) {
      opacity: 0.9;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .generate-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .strength-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .strength-row label {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 500;
    }

    input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .strength-val {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      min-width: 30px;
      text-align: right;
    }

    .status {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      min-height: 18px;
    }

    .status.error { color: var(--error); }
    .status.success { color: var(--success); }
  </style>
</head>
<body>

<header>
  <div class="badge">Free &amp; Unlimited</div>
  <h1>Image to Image</h1>
  <p>Powered by Qwen via Puter.js — no limits, no sign-up</p>
</header>

<div class="card">
  <div class="panels">
    <div>
      <div class="panel-label">Source Image</div>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" />
        <div class="drop-icon">🖼</div>
        <div class="drop-text">Click or drag an image here</div>
      </div>
    </div>
    <div>
      <div class="panel-label">Result</div>
      <div class="output-panel" id="outputPanel">
        <div class="output-placeholder">✨<p>Your result appears here</p></div>
        <div class="spinner" id="spinner"></div>
        <a class="download-btn" id="downloadBtn" download="result.png">⬇ Download</a>
      </div>
    </div>
  </div>

  <div class="strength-row">
    <label>Transform strength</label>
    <input type="range" id="strength" min="1" max="10" value="7" />
    <span class="strength-val" id="strengthVal">7</span>
  </div>

  <div class="prompt-row">
    <textarea id="prompt" placeholder="Describe how to transform the image… e.g. 'turn into a watercolor painting', 'make it look like a Studio Ghibli scene', 'add dramatic sunset lighting'"></textarea>
    <button class="generate-btn" id="generateBtn" disabled>Generate</button>
  </div>

  <div class="status" id="status">Upload an image to get started</div>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const prompt = document.getElementById('prompt');
  const generateBtn = document.getElementById('generateBtn');
  const strengthSlider = document.getElementById('strength');
  const strengthVal = document.getElementById('strengthVal');
  const spinner = document.getElementById('spinner');
  const outputPanel = document.getElementById('outputPanel');
  const downloadBtn = document.getElementById('downloadBtn');
  const status = document.getElementById('status');

  let uploadedImageBase64 = null;
  let uploadedMimeType = 'image/png';

  strengthSlider.addEventListener('input', () => {
    strengthVal.textContent = strengthSlider.value;
  });

  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  function loadFile(file) {
    uploadedMimeType = file.type || 'image/png';
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      uploadedImageBase64 = dataUrl.split(',')[1];

      // Show preview
      dropZone.querySelectorAll('img').forEach(i => i.remove());
      const img = document.createElement('img');
      img.src = dataUrl;
      dropZone.appendChild(img);

      generateBtn.disabled = false;
      setStatus('Image loaded — write a prompt and hit Generate');
    };
    reader.readAsDataURL(file);
  }

  generateBtn.addEventListener('click', async () => {
    const p = prompt.value.trim();
    if (!uploadedImageBase64) return setStatus('Please upload an image first', 'error');
    if (!p) return setStatus('Please enter a prompt', 'error');

    generateBtn.disabled = true;
    setStatus('Generating… this may take 15–30 seconds');

    // Show spinner, hide placeholder & old result
    outputPanel.querySelectorAll('img').forEach(i => i.remove());
    outputPanel.querySelector('.output-placeholder').style.display = 'none';
    downloadBtn.style.display = 'none';
    spinner.style.display = 'block';

    const strength = parseInt(strengthSlider.value);
    const strengthDesc = strength <= 3 ? 'subtle changes, keep most of the original image' :
                         strength <= 6 ? 'moderate transformation' :
                         'strong transformation, heavily restyle the image';

    const fullPrompt = `Transform this image: ${p}. Transformation strength: ${strengthDesc} (${strength}/10). Generate a high quality result that matches the description.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 100,
          messages: [{ role: 'user', content: 'ping' }]
        })
      });
    } catch(e) {}

    // Use puter.js for image generation
    try {
      // Pass image + prompt to Qwen vision model to describe, then generate
      const visionResult = await puter.ai.chat(
        [
          {
            type: 'image',
            image: `data:${uploadedMimeType};base64,${uploadedImageBase64}`
          },
          {
            type: 'text',
            text: `Describe this image in detail in 2-3 sentences covering: subject, style, colors, composition, lighting, and mood. Be precise and visual.`
          }
        ],
        { model: 'claude-sonnet-4-6' }
      );

      const imageDesc = visionResult?.message?.content?.[0]?.text || visionResult?.toString() || '';

      const imgPrompt = `${fullPrompt}\n\nOriginal image description: ${imageDesc}`;

      const imgElement = await puter.ai.txt2img(imgPrompt, { model: 'qwen/qwen-image-2.0' });

      spinner.style.display = 'none';

      if (imgElement && imgElement.src) {
        imgElement.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:10px;';
        outputPanel.appendChild(imgElement);
        downloadBtn.href = imgElement.src;
        downloadBtn.style.display = 'block';
        setStatus('Done! ✓', 'success');
      } else {
        throw new Error('No image returned');
      }
    } catch (err) {
      spinner.style.display = 'none';
      outputPanel.querySelector('.output-placeholder').style.display = 'flex';
      setStatus('Error: ' + (err.message || 'Something went wrong. Try again.'), 'error');
      console.error(err);
    }

    generateBtn.disabled = false;
  });

  function setStatus(msg, type = '') {
    status.textContent = msg;
    status.className = 'status' + (type ? ' ' + type : '');
  }
</script>
</body>
</html>
